name: Auto-merge approved content

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR only touches catalog/
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          files=$(gh pr diff "$PR_NUMBER" --name-only --repo "$GITHUB_REPOSITORY")
          non_catalog=$(echo "$files" | grep -v '^catalog/' || true)
          if [ -n "$non_catalog" ]; then
            echo "PR touches non-catalog files — skipping auto-merge:"
            echo "$non_catalog"
            echo "catalog_only=false" >> "$GITHUB_OUTPUT"
          else
            echo "catalog_only=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: steps.check.outputs.catalog_only == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --auto --repo "$GITHUB_REPOSITORY"
          echo "Auto-merge enabled for PR #$PR_NUMBER"
